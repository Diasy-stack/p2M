<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پخش آهنگ: Dancin</title>
    <style>
        .hidden-audio {
            display: none; /* پنهان کردن دکمه پخش */
        }
        .song-image {
            cursor: pointer; /* نشان دادن اینکه تصویر قابل کلیک است */
        }
    </style>
</head>
<body>

    <h1>آهنگ: Dancin</h1>
    <img src="file_00000000f15c71f7a78e606137f4f321.png" alt="آهنگ Dancin" class="song-image" onclick="togglePlay()">
    
    <audio id="audio" class="hidden-audio">
        <source src="Aaron Smith - Dancin - 320.mp3" type="audio/mpeg">
        مرورگر شما از این فرمت پشتیبانی نمی‌کند.
    </audio>

    <script>
        const audio = document.getElementById('audio');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>

</body>
</html>
