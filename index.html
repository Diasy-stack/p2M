<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aaron Smith - Dancin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #cover {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            cursor: pointer;
            display: block;
        }

        #audio {
            display: none;
        }
    </style>
</head>
<body>
    <img id="cover" src="file_00000000f15c71f7a78e606137f4f321.png" alt="Album Cover">
    <audio id="audio" src="Aaron Smith - Dancin - 320.mp3"></audio>

    <script>
        const cover = document.getElementById('cover');
        const audio = document.getElementById('audio');

        cover.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        });
    </script>
</body>
</html>
